name: .NET

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore PCSX2GridView.sln
    - name: Build
      run: dotnet build PCSX2GridView.sln --no-restore
    - name: Test
      run: dotnet test PCSX2GridView.sln --no-build --verbosity normal
